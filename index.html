<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homestar Field App</title>
    <!-- React and Babel for browser-side execution -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            margin: 0;
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- MOCK DATA ---
        const MOCK_JOBS = [
            { id: 'j1', jobNumber: '26-1845_WTR', customerName: 'Alice Johnson', address: '123 River Road, Conyers, GA 30012', phoneDisplay: '(404) 555-0123', scheduledTime: '08:00 AM', type: 'WTR', notes: 'Standing water in basement.' },
            { id: 'j2', jobNumber: '26-2819_FIRE', customerName: 'Bob Smith', address: '456 Oak Lane, Atlanta, GA 30303', phoneDisplay: '(678) 555-9876', scheduledTime: '10:00 AM', type: 'FIRE', notes: 'Structural soot cleaning.' },
            { id: 'j3', jobNumber: '26-3001_MOLD', customerName: 'Charlie Davis', address: '789 Pine Street, Decatur, GA 30030', phoneDisplay: '(770) 555-4321', scheduledTime: '12:00 PM', type: 'MOLD', notes: 'Containment already set up.' }
        ];

        // Simple Icon Component Helper
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [currentScreen, setCurrentScreen] = useState('login');
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [isClockedIn, setIsClockedIn] = useState(false);
            const [totalShiftTime, setTotalShiftTime] = useState(0);
            const [jobStates, setJobStates] = useState({});
            const [selectedJob, setSelectedJob] = useState(null);

            // Re-render icons when screen changes
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            // Clock Logic
            useEffect(() => {
                let interval;
                if (isClockedIn) {
                    interval = setInterval(() => setTotalShiftTime(t => t + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [isClockedIn]);

            const formatTime = (s) => {
                const h = Math.floor(s / 3600).toString().padStart(2, '0');
                const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
                const sec = (s % 60).toString().padStart(2, '0');
                return `${h}:${m}:${sec}`;
            };

            // Shared Layout Components
            const Header = ({ showBack = true, onBack = () => setCurrentScreen('dashboard') }) => (
                <div className="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-black/50 backdrop-blur-md sticky top-0 z-50">
                    <button 
                        onClick={() => showBack ? onBack() : setCurrentScreen('settings')}
                        className="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 border border-white/10 active:scale-95 transition-all"
                    >
                        <Icon name={showBack ? "arrow-left" : "settings"} size={18} className="text-white" />
                    </button>
                    
                    {/* COMMAND CENTER AND NAME REMOVED AS REQUESTED */}
                    <div className="flex-1"></div>

                    <button 
                        onClick={() => setCurrentScreen('chat')}
                        className="w-10 h-10 flex items-center justify-center rounded-xl bg-blue-600 active:scale-95 transition-all shadow-lg shadow-blue-600/20"
                    >
                        <Icon name="message-square" size={18} className="text-white" />
                    </button>
                </div>
            );

            // Screen: Login
            if (currentScreen === 'login') {
                return (
                    <div className="h-full flex flex-col bg-black text-white p-8 items-center justify-center text-center">
                        <p className="text-[10px] font-black tracking-[0.8em] text-blue-500 uppercase mb-2">THE</p>
                        <h1 className="text-5xl font-black tracking-widest leading-[0.9] mb-12">HOMESTAR<br/>GROUP</h1>
                        <div className="w-full max-w-xs space-y-4">
                            <div className="bg-white/5 border border-white/10 rounded-2xl p-4 text-left">
                                <p className="text-[8px] font-black text-white/30 tracking-widest uppercase mb-1">OPERATOR ID</p>
                                <p className="text-sm font-bold text-white/50">UNIT-026</p>
                            </div>
                            <button 
                                onClick={() => setCurrentScreen('dashboard')}
                                className="w-full py-5 bg-blue-600 rounded-2xl font-black text-xs tracking-[0.2em] uppercase shadow-2xl shadow-blue-900/40 active:scale-95 transition-all"
                            >
                                Verify Identity
                            </button>
                        </div>
                    </div>
                );
            }

            // Screen: Dashboard
            if (currentScreen === 'dashboard') {
                return (
                    <div className="h-full flex flex-col bg-black text-white overflow-y-auto no-scrollbar">
                        <Header showBack={false} />
                        <div className="p-6 space-y-6">
                            {/* Stats Card */}
                            <div className="bg-[#0c0c0c] border border-white/10 rounded-[2.5rem] p-8 relative overflow-hidden">
                                <div className="relative z-10">
                                    <div className="flex items-center gap-2 mb-4">
                                        <div className={`w-2 h-2 rounded-full ${isClockedIn ? 'bg-blue-500 animate-pulse' : 'bg-white/20'}`}></div>
                                        <p className="text-[10px] font-black text-white/30 uppercase tracking-widest">
                                            {isClockedIn ? 'Operational' : 'Shift Standby'}
                                        </p>
                                    </div>
                                    <h2 className="text-6xl font-black tracking-tighter mb-6">{formatTime(totalShiftTime)}</h2>
                                    <div className="flex gap-6 border-t border-white/5 pt-4">
                                        <div><p className="text-[8px] font-black text-white/20 uppercase tracking-widest">Callsign</p><p className="text-xs font-bold text-blue-500">UNIT-026</p></div>
                                        <div><p className="text-[8px] font-black text-white/20 uppercase tracking-widest">Station</p><p className="text-xs font-bold text-blue-500">HQ-NORTH</p></div>
                                    </div>
                                </div>
                                <Icon name="activity" size={120} className="absolute -right-6 -bottom-6 text-white/[0.02]" />
                            </div>

                            <button 
                                onClick={() => setIsClockedIn(!isClockedIn)}
                                className={`w-full py-5 rounded-2xl font-black text-xs tracking-[0.2em] uppercase transition-all flex items-center justify-center gap-3 border ${isClockedIn ? 'bg-white text-black border-white shadow-white/10' : 'bg-blue-600 text-white border-blue-600 shadow-blue-900/40'}`}
                            >
                                <Icon name={isClockedIn ? "log-out" : "clock"} size={18} />
                                {isClockedIn ? 'Clock Out' : 'Start Shift'}
                            </button>

                            <div className="space-y-3">
                                <h4 className="text-[10px] font-black text-white/20 uppercase tracking-widest px-2">Operational Access</h4>
                                <button onClick={() => setCurrentScreen('jobs')} className="w-full flex items-center gap-4 p-5 bg-[#0c0c0c] border border-white/5 rounded-3xl active:scale-[0.98] transition-all text-left">
                                    <div className="w-12 h-12 bg-blue-600 text-white flex items-center justify-center rounded-2xl shrink-0 shadow-lg shadow-blue-600/20">
                                        <Icon name="briefcase" size={24} />
                                    </div>
                                    <div className="flex-1">
                                        <h3 className="text-sm font-extrabold uppercase">Today's Jobs</h3>
                                        <p className="text-[10px] font-bold text-white/30 uppercase mt-0.5">{MOCK_JOBS.length} Assigned Taskings</p>
                                    </div>
                                    <Icon name="chevron-right" size={18} className="text-blue-600" />
                                </button>
                                
                                <button onClick={() => setCurrentScreen('timesheet')} className="w-full flex items-center gap-4 p-5 bg-[#0c0c0c] border border-white/5 rounded-3xl active:scale-[0.98] transition-all text-left">
                                    <div className="w-12 h-12 bg-white/5 text-blue-600 flex items-center justify-center rounded-2xl shrink-0">
                                        <Icon name="calendar" size={24} />
                                    </div>
                                    <div className="flex-1">
                                        <h3 className="text-sm font-extrabold uppercase">Timesheet</h3>
                                        <p className="text-[10px] font-bold text-white/30 uppercase mt-0.5">View Weekly Logs</p>
                                    </div>
                                    <Icon name="chevron-right" size={18} className="text-blue-600" />
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Screen: Job List
            if (currentScreen === 'jobs') {
                return (
                    <div className="h-full flex flex-col bg-black text-white">
                        <Header />
                        <div className="p-6 space-y-4 overflow-y-auto no-scrollbar">
                            {MOCK_JOBS.map(job => (
                                <div key={job.id} className="bg-[#0c0c0c] border-l-4 border-blue-600 border-white/10 rounded-2xl p-5 active:scale-[0.98] transition-all" onClick={() => { setSelectedJob(job); setCurrentScreen('details'); }}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <p className="text-blue-500 text-[10px] font-black uppercase tracking-widest">{job.jobNumber}</p>
                                            <h3 className="text-lg font-black uppercase tracking-tight mt-1">{job.customerName}</h3>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[8px] font-black text-white/20 uppercase">Arrival</p>
                                            <p className="text-sm font-bold mt-0.5">{job.scheduledTime}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2 text-white/40 mb-5">
                                        <Icon name="map-pin" size={14} className="text-blue-600" />
                                        <span className="text-[10px] font-bold uppercase truncate">{job.address}</span>
                                    </div>
                                    <button className="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-[10px] tracking-widest uppercase">Initiate Protocol</button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // Fallback for screens not fully implemented in this demo
            return (
                <div className="h-full flex flex-col bg-black text-white">
                    <Header />
                    <div className="flex-1 flex flex-col items-center justify-center p-12 text-center">
                        <div className="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6">
                            <Icon name="construction" size={32} className="text-blue-500" />
                        </div>
                        <h2 className="text-xl font-black uppercase tracking-tight">Access Restricted</h2>
                        <p className="text-xs text-white/30 uppercase tracking-widest mt-2">Section Under Development</p>
                        <button onClick={() => setCurrentScreen('dashboard')} className="mt-8 px-8 py-4 bg-white text-black rounded-xl font-black text-[10px] uppercase tracking-widest">Return to Base</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <div className="flex items-center justify-center h-screen w-screen p-4">
                <div className="relative w-full max-w-[400px] aspect-[9/19.5] bg-black rounded-[3.5rem] border-[12px] border-[#1a1a1a] shadow-[0_0_100px_rgba(0,0,0,0.8)] overflow-hidden">
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-7 bg-black rounded-b-3xl z-[60]"></div>
                    <App />
                </div>
            </div>
        );
    </script>
</body>
</html>
