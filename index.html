<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homestar Field App</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0f1d; }
        .logo-font { font-family: 'Crimson Pro', serif; }
        .star-blue { color: #4a5fb4; }
        /* Smooth transitions */
        .page-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Fixed Icon components by wrapping multiple paths in React Fragments (<> ... </>)
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                briefcase: (
                    <>
                        <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16M2 8h20v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8Z"/>
                        <path d="M16 20h-8"/>
                    </>
                ),
                msg: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                clock: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </>
                ),
                send: (
                    <>
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </>
                ),
                back: <polyline points="15 18 9 12 15 6"/>,
                check: <polyline points="20 6 9 17 4 12"/>,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                nav: <polygon points="3 11 22 2 13 21 11 13 3 11"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const MOCK_JOBS = [
            { id: 'j1', jobNumber: '26-1845_WTR', customerName: 'Alice Johnson', address: '123 River Road, Conyers, GA 30012', status: 'In Progress', time: '08:00 AM', type: 'WTR', notes: 'Lockbox: 1234' },
            { id: 'j2', jobNumber: '26-2819_FIRE', customerName: 'Bob Smith', address: '456 Oak Lane, Atlanta, GA 30303', status: 'Scheduled', time: '10:00 AM', type: 'FIRE', notes: 'Soot cleaning' }
        ];

        function App() {
            const [screen, setScreen] = useState('login');
            const [user, setUser] = useState(null);
            const [msg, setMsg] = useState("");
            const [chat, setChat] = useState([
                { user: 'Admin Sarah', text: 'Traffic delay on I-20.', time: '8:15 AM' }
            ]);

            const Login = () => (
                <div className="h-full flex flex-col justify-center p-10 bg-white">
                    <div className="mb-12">
                        <h1 className="text-4xl logo-font font-black text-black leading-none uppercase tracking-tighter">The</h1>
                        <div className="flex items-baseline">
                            <h1 className="text-5xl logo-font font-black text-black leading-none uppercase tracking-tighter">Homest</h1>
                            <span className="text-5xl logo-font font-black star-blue">★</span>
                            <h1 className="text-5xl logo-font font-black text-black leading-none uppercase tracking-tighter">r</h1>
                        </div>
                        <h2 className="text-3xl logo-font font-bold text-black border-t-2 border-black mt-1">GROUP</h2>
                        <p className="text-[10px] font-bold tracking-[.4em] text-blue-600 mt-2 uppercase">Field Operations</p>
                    </div>
                    <input className="w-full mb-3 p-4 bg-gray-50 border border-gray-100 rounded-xl font-bold text-sm" placeholder="OPERATOR ID" />
                    <input className="w-full mb-6 p-4 bg-gray-50 border border-gray-100 rounded-xl font-bold text-sm" type="password" placeholder="ACCESS KEY" />
                    <button onClick={() => {setUser({name: 'Tech 01'}); setScreen('dash')}} className="w-full bg-[#14234b] text-white py-4 rounded-xl font-black tracking-widest shadow-lg">AUTHENTICATE</button>
                </div>
            );

            const Dash = () => (
                <div className="h-full flex flex-col bg-[#f8f9fc] page-enter">
                    <div className="p-8 pt-12 flex justify-between items-center bg-white border-b border-gray-100">
                        <div>
                            <h2 className="text-lg font-black text-[#14234b] uppercase">Operations</h2>
                            <p className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Station: Conyers 026</p>
                        </div>
                        <button onClick={() => setScreen('chat')} className="p-3 bg-blue-50 text-blue-600 rounded-xl relative">
                            <Icon name="msg" />
                            <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                        </button>
                    </div>
                    
                    <div className="p-8 space-y-6">
                        <button onClick={() => setScreen('jobs')} className="w-full p-6 bg-white border border-gray-100 rounded-3xl shadow-sm flex items-center gap-4">
                            <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white"><Icon name="briefcase" /></div>
                            <div className="text-left">
                                <p className="font-black text-[#14234b] uppercase tracking-tight">Active Dispatch</p>
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">2 Assignments Pending</p>
                            </div>
                        </button>

                        <button onClick={() => setScreen('time')} className="w-full p-6 bg-white border border-gray-100 rounded-3xl shadow-sm flex items-center gap-4">
                            <div className="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white"><Icon name="clock" /></div>
                            <div className="text-left">
                                <p className="font-black text-[#14234b] uppercase tracking-tight">Analytics</p>
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">7.5 Billable Hours Today</p>
                            </div>
                        </button>
                    </div>
                </div>
            );

            const Chat = () => (
                <div className="h-full flex flex-col bg-white page-enter">
                    <div className="p-8 pt-12 flex items-center gap-4 border-b">
                        <button onClick={() => setScreen('dash')} className="p-2 bg-gray-50 rounded-lg"><Icon name="back" /></button>
                        <h2 className="text-lg font-black text-[#14234b] uppercase">Field Chat</h2>
                    </div>
                    <div className="flex-1 p-6 space-y-4 overflow-y-auto">
                        {chat.map((c, i) => (
                            <div key={i} className="flex flex-col">
                                <span className="text-[9px] font-black text-gray-400 mb-1">{c.user} • {c.time}</span>
                                <div className="bg-gray-50 p-4 rounded-2xl rounded-tl-none text-[12px] font-bold text-[#14234b] border border-gray-100">
                                    {c.text}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-6 border-t flex gap-2">
                        <input value={msg} onChange={e => setMsg(e.target.value)} className="flex-1 bg-gray-50 p-4 rounded-xl text-xs font-bold" placeholder="Update team..." />
                        <button onClick={() => {if(msg.trim()){setChat([...chat, {user: 'You', text: msg, time: 'Now'}]); setMsg("")}}} className="p-4 bg-[#14234b] text-white rounded-xl"><Icon name="send" /></button>
                    </div>
                </div>
            );

            return (
                <div className="flex justify-center items-center min-h-screen p-4">
                    <div className="w-full max-w-[400px] h-[750px] bg-white rounded-[3rem] shadow-2xl overflow-hidden border-[8px] border-gray-900 relative">
                        {screen === 'login' && <Login />}
                        {screen === 'dash' && <Dash />}
                        {screen === 'chat' && <Chat />}
                        {screen === 'jobs' && (
                            <div className="h-full bg-[#f8f9fc] page-enter flex flex-col">
                                <div className="p-8 pt-12 flex items-center gap-4 border-b bg-white">
                                    <button onClick={() => setScreen('dash')} className="p-2 bg-gray-50 rounded-lg"><Icon name="back" /></button>
                                    <h2 className="text-lg font-black text-[#14234b] uppercase">Jobs</h2>
                                </div>
                                <div className="p-6 space-y-4 overflow-y-auto">
                                    {MOCK_JOBS.map(j => (
                                        <div key={j.id} className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                                            <div className="flex justify-between mb-2">
                                                <span className="text-[10px] font-black text-blue-600 uppercase">{j.jobNumber}</span>
                                                <span className="text-[10px] font-black text-gray-400">{j.time}</span>
                                            </div>
                                            <h3 className="text-lg font-black text-[#14234b] mb-4">{j.customerName}</h3>
                                            <div className="flex gap-2 mb-6">
                                                <div className="flex-1 bg-gray-50 p-3 rounded-xl flex items-center gap-2">
                                                    <Icon name="nav" size={14} className="text-blue-600" />
                                                    <span className="text-[10px] font-bold text-gray-500 truncate">{j.address}</span>
                                                </div>
                                            </div>
                                            <button className="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-md">Begin Work</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
